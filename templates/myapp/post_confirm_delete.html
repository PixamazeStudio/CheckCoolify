<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Post - My Django App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 100px auto;
            background: white;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .warning-icon {
            font-size: 48px;
            margin-bottom: 20px;
            color: #f44336;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .post-title {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .confirmation-message {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button,
        a {
            padding: 12px 24px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        button {
            background: #f44336;
            color: white;
        }
        button:hover {
            background: #da190b;
        }
        .btn-cancel {
            background: #ddd;
            color: #333;
        }
        .btn-cancel:hover {
            background: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning-icon">⚠️</div>
        
        <h1>Delete Post</h1>
        
        <div class="post-title">
            "{{ object.title }}"
        </div>

        <div class="confirmation-message">
            <p>Are you sure you want to delete this post? This action cannot be undone.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit">Yes, Delete It</button>
                <a href="{% url 'post-detail' object.pk %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
